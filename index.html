<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Postcard Grandma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      background: rgba(0,0,0,0.75);
      color: #00ff66;
      padding: 8px 12px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div id="status">Loading...</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="alpha: true; antialias: true; colorManagement: true"
  embedded
  background="transparent: true"
>
  <a-assets>
    <video
      id="videograndma"
      src="video grandma.mp4"
      preload="auto"
      loop
      playsinline
      webkit-playsinline
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-video
      src="#videograndma"
      width="1"
      height="1.4"
      position="0 0 0.01"
    ></a-video>
  </a-entity>
</a-scene>

<script>
  const status = document.querySelector("#status");
  const video = document.querySelector("#videograndma");
  const target = document.querySelector("#target");
  const scene = document.querySelector("a-scene");

  status.innerText = "Camera ready. Searching target...";

  scene.addEventListener("loaded", () => {
    const renderer = scene.renderer;
    renderer.setClearColor(0x000000, 0);
  });

  video.addEventListener("loadeddata", () => {
    status.innerText = "Video loaded. Searching target...";
  });

  video.addEventListener("error", () => {
    status.innerText = "VIDEO ERROR: file not loaded";
  });

  target.addEventListener("targetFound", async () => {
    status.innerText = "TARGET FOUND. Trying video...";
    try {
      await video.play();
      status.innerText = "TARGET FOUND. VIDEO PLAYING";
    } catch (e) {
      status.innerText = "TARGET FOUND. VIDEO BLOCKED";
    }
  });

  target.addEventListener("targetLost", () => {
    status.innerText = "Target lost";
    video.pause();
  });
</script>

</body>
</html>
